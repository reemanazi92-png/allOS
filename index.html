// ===== تحميل السؤال الحالي =====
function loadQuestion(){
    const q = quiz[current];
    document.getElementById("questionText").innerText = (current+1)+". "+q.question;

    const answersDiv = document.getElementById("answersContainer");
    answersDiv.innerHTML = "";
    q.answers.forEach((a,i)=>{
        const label = document.createElement("label");
        label.innerHTML = `<input type="radio" name="answer" value="${i}"> ${a}`;
        answersDiv.appendChild(label);
    });

    document.getElementById("progress").style.width = ((current/quiz.length)*100) + "%";
    document.getElementById("nextBtn").innerText = (current === quiz.length-1) ? "إنهاء الاختبار" : "التالي";
}

// ===== التالي =====
function nextQuestion(){
    const selected = document.querySelector('input[name="answer"]:checked');
    if(!selected){ alert("يرجى اختيار إجابة"); return; }

    if(parseInt(selected.value) === quiz[current].correct) score++;
    current++;
    if(current < quiz.length){ loadQuestion(); }
    else { finishExam(); }
}

// ===== إنهاء الاختبار =====
function finishExam(){
    document.getElementById("quiz").style.display = "none";
    const resDiv = document.getElementById("result");
    resDiv.style.display = "block";
    resDiv.innerHTML = `<h1>انتهى الاختبار</h1><div class="result">${studentName}، درجتك: ${score} من ${quiz.length}</div>`;
}
</script>
</body>
</html>
